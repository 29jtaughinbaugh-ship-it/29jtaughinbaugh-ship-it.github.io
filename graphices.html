<!DOCTYPE html>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <svg width="300" height="300" onmousedown="grow()" onmouseup="shrink()">
<circle cx="150" cy="150" r="100" fill="lightblue"
stroke="black" stroke-width="5"/>
    <circle id="eye" cx="115" cy="120" r="10" fill="red"/>
    <circle id="eye" cx="185" cy="120" r="10" fill="blue"/>
    <line x1="110" y1="200" x2="190" y2="200"
    stroke="black" stroke-width="5"/>

    <line x1="90" y1="90" x2="130" y2="100"
    stroke="black" stroke-width="5"/>
    <line x1="210" y1="90" x2="170" y2="100"
    stroke="black" stroke-width="5"/>
        </svg>
</body>
<script>
function grow() {
    const circle = document.getelementbyid("eye");
    circle.setattribute("r", "40");
    circle.setattribute("cy", "170");
}

function shrink() {
    const circle = document.getElementById("eye");
    circle.setAttribute("r", "10");
    circle.setAttribute("cy", "220");
    
}
</script>
</html>
