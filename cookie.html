<!DOCTYPE html>
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cookie clicker</title>
    <nav>
        <ul>
            <li><a href="index.html">the final project</a></li>
        </ul>
    </nav>
    
</head>

<body>
    <img src="cookie.png" alt="cookie" width="400" id="cookie" onclick="cookieClick()">
    <div id="score">0</div>
    <button id="autoButton" onclick="autoClickUpgrade()">upgrade Autoclick (100 click)</button>
    <button id="multiButton" onclick="clickMultiUpgrade()">upgrade Click Multier (100 click)</button>
    <link rel="stylesheet" href="style+.css">
</body>
<script>

    //configuration

    // Autoclick
    var autoclickAmount = 0;
    var autoclickCostPerLevel = 100;
    var autoclickCost = 100;

    // clickMulti
    var clickMulti = 1;
    var clickMultiCostPerLevel = 100;
    var clickMultiCost = 100;

    var score = 0;
    var scoreBox = document.getElementById("score");
    var autoButton = document.getElementById("autoButton");

    function cookieClick() {
        score = score + (100 * clickMulti)
        scoreBox.innerHTML = score;
        saveGame();
    }
    function autoClickUpgrade() {
        if (score >= autoclickCost) {
            score = score - autoclickCost;
            autoclickAmount = autoclickAmount + 1;
            autoclickCost = autoclickCost + autoclickCostPerLevel;
            autoButton.innerHTML = "Upgrade Auto-Click (" + autoclickCost + " click)"
            scoreBox.innerHTML = score;
            saveGame();

        }
    }

    function clickMultiUpgrade() {
        if (score >= clickMultiCost) {
            score = score - clickMultiCost;
            clickMulti = clickMulti + 1;
            clickMultiCost = clickMultiCost + clickMultiCostPerLevel;
            multiButton.innerHTML = "Upgrade Click-Miutiplier (" + clickMultiCost + " click)"
            scoreBox.innerHTML = score;
            saveGame();

        }
    }

    function autoClick() {
        score = score + (1 * autoclickAmount);
        scoreBox.innerHTML = score;
        saveGame();
    }

    function saveGame() {
        var saveData = {
            autoclickAmount: autoclickAmount,
            autoclickCostPerLevel: autoclickCostPerLevel,
            autoclickCost: autoclickCost,
            clickMulti: clickMulti,
            clickMultiCostPerLevel: clickMultiCostPerLevel,
            clickMultiCost: clickMultiCost,

            score: score
        }
        var saveText = JSON.stringify(saveData)

        console.log(saveText)

        document.cookie = saveText;

    }

    function loadGame() {
        var cookieText = document.cookie;

        cookieText = JSON.parse(cookieText);

        autoclickAmount = cookieText.autoclickAmount;
        autoclickCostPerLevel = cookieText.autoclickCostPerLevel;
        autoclickCost = cookieText.autoclickCost;
        clickMulti = cookieText.clickMulti;
        clickMultiCostPerLevel = cookieText.clickMultiCostPerLevel;
        clickMultiCost = cookieText.clickMultiCost;
        score = cookieText.score;
    }

    setInterval(autoClick, 0)

    loadGame();

</script>

</html>
