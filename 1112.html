<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: lightblue;
        }
        nav ul {
            display: flex;
            justify-content: space-evenly;
            list-style-type: none;
            padding: 0;
        }
        nav ul li :hover {
            background-color: aqua;
            margin: 0px;
            padding: 10px 30px 10px 30px;
            transition: 0.5s;
        }
        nav ul li {
            margin: 0px 20px 0px 20px;
            background-color: aqua;
            padding: 10px;
            border: 5px ridge darkslateblue;
            border-radius: 10px;
            transition: 0.5s;
        }
        article {
            background-color: aliceblue;
            width: 75%;
            border-width: 5px;
            border-style: dashed;
            border-color: darkslateblue;
            border-radius: 10px;
            padding: 10px;
        }
    </style>
</head>
<body>
    <h1>page top Header</h1>
    <nav>
        <ul>
            <li><a href="#">link</a></li>
            <li><a href="#">link</a></li>
            <li><a href="#">link</a></li>
            <li><a href="#">link</a></li>
            <li><a href="#">link</a></li>
        </ul>
    </nav>
    <article>
        <h2>article title</h2>
        <p>some text</p>
    </article>
    <footer>
        &copy; 2026
    </footer>
</body>

</html>
